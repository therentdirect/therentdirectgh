<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#050505" />
  <title>You’re Offline | RentDirect</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f8fafc;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: 100%;
      max-width: 520px;
      padding: 42px 28px;
      text-align: center;
      border-radius: 32px;
      background: #050505;
      color: white;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.18);
    }

    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border: 3px solid #facc15;
      border-radius: 24px;
      color: #facc15;
      font-size: 34px;
      font-weight: 900;
    }

    h1 {
      margin: 28px 0 12px;
      font-size: 34px;
    }

    p {
      margin: 0 auto;
      max-width: 390px;
      color: #d4d4d4;
      line-height: 1.65;
    }

    button {
      margin-top: 28px;
      border: 0;
      border-radius: 999px;
      padding: 15px 25px;
      background: #facc15;
      color: #050505;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">RD</div>

    <h1>You’re offline</h1>

    <p>
      RentDirect cannot connect to the internet right now. Check your
      connection and try again.
    </p>

    <button onclick="window.location.reload()">Try Again</button>
  </main>
</body>
</html>
